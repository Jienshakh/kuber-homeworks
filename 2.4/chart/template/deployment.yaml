
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-web-app
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: web-app
  template:
    metadata:
      labels:
        app: web-app
    spec:
      containers:
      {{- range .Values.containers }}
      - name: {{ .name }}
        image: {{ .image }}
        imagePullPolicy: {{ .imagePullPolicy | default "IfNotPresent" }}
        {{- if .env }}
        env: 
          {{- toYaml .env | nindent 12 }}
        {{- end }}
        {{- if .ports }}
        ports:
          {{- toYaml .ports | nindent 12 }}
        {{- end }}
        {{- if .volumeMounts }}
        volumeMounts:
          {{- toYaml .volumeMounts | nindent 12 }}
        {{- end }}
        {{- if .resources }}
        resources:
          {{- toYaml .resources | nindent 12 }}
        {{- end }}
      volumes:
      {{- range $.Values.volumes }}
      {{- if .enabled }}
      - name: {{ .name }}
        {{- if .configMap  }}
        configMap:
          name: {{ .configMap.name}}
          {{- if .configMap.items }}
          items:
            {{- toYaml .configMap.items | nindent 14 }}
          {{- end }}
        {{- else if .secret}}
        secret:
          secretName: {{ .secret.secretName }}
        {{- else if .emptyDir }}
        emptyDir: {}
        {{- else if .persistentVolumeClaim }}
        persistentVolumeClaim:
          claimName: {{ .persistentVolumeClaim.claimName }}
        {{- end }}
      {{- end }}
      {{- end }}