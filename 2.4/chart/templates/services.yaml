{{- range .Values.services }}
{{- if .enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .name }}-{{ $.Release.Name }}
  labels:
    app: {{ $.Chart.Name }}
    release: {{ $.Release.Name }}
spec:
  type: {{ .type }}
  ports:
    {{- toYaml .ports | nindent 4 }}
  selector:
    app: {{ $.Chart.Name }}
    release: {{ $.Release.Name }}
    {{- toYaml .selector | nindent 4 }}
{{- end }}
{{- end }}