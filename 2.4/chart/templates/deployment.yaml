{{- range $componentName, $component := .Values.components }}
{{- if $component.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $.Release.Name }}-{{ $component.name }}
  labels:
    app: {{ $.Chart.Name }}
    release: {{ $.Release.Name }}
    component: {{ $component.name }}
spec:
  replicas: {{ $.Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ $.Chart.Name }}
      release: {{ $.Release.Name }}
      component: {{ $component.name }}
  template:
    metadata:
      labels:
        app: {{ $.Chart.Name }}
        release: {{ $.Release.Name }}
        component: {{ $component.name }}
    spec:
      containers:
      - name: {{ $component.name }}
        image: {{ $component.image }}
        imagePullPolicy: {{ $component.imagePullPolicy }}
        {{- if $component.env }}
        env:
          {{- toYaml $component.env | nindent 10 }}
        {{- end }}
        {{- if $component.ports }}
        ports:
          {{- toYaml $component.ports | nindent 10 }}
        {{- end }}
        {{- if $component.volumeMounts }}
        volumeMounts:
          {{- toYaml $component.volumeMounts | nindent 10 }}
        {{- end }}
        {{- if $component.resources }}
        resources:
          {{- toYaml $component.resources | nindent 10 }}
        {{- end }}
      volumes:
      {{- range $.Values.volumes }}
      {{- if .enabled }}
      - name: {{ .name }}
        {{- if .configMap }}
        configMap:
          name: {{ .configMap.name }}-{{ $.Release.Name }}
          {{- if .configMap.items }}
          items:
            {{- toYaml .configMap.items | nindent 6 }}
          {{- end }}
        {{- end }}
        {{- if .secret }}
        secret:
          secretName: {{ .secret.secretName }}-{{ $.Release.Name }}
        {{- end }}
        {{- if .emptyDir }}
        emptyDir: {}
        {{- end }}
        {{- if .persistentVolumeClaim }}
        persistentVolumeClaim:
          claimName: {{ .persistentVolumeClaim.claimName }}
        {{- end }}
      {{- end }}
      {{- end }}
{{- end }}
{{- end }}