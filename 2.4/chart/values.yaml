# Общие настройки
replicaCount: 1

# Настройки компонентов
components:
  nginx:
    enabled: true
    name: nginx
    image: nginx:1.14.2
    imagePullPolicy: IfNotPresent
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 250m
        memory: 256Mi
    ports:
      - containerPort: 80
        name: http
    volumeMounts:
      - name: web-content
        mountPath: /usr/share/nginx/html/index.html
        subPath: index.html
    
  multitool:
    enabled: true
    name: multitool
    image: wbitt/network-multitool:3.22
    imagePullPolicy: IfNotPresent
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 250m
        memory: 256Mi
    ports:
      - containerPort: 8080
        name: http
    env:
      - name: HTTP_PORT
        value: "8080"

# Общие volumes
volumes:
  - name: web-content
    enabled: true
    configMap:
      name: web-content

# Services
services:
  - name: web-app-svc
    enabled: true
    type: ClusterIP
    ports:
      - protocol: TCP
        port: 80
        targetPort: 80
        name: http
    selector:
      app: web-app
      component: nginx

# ConfigMaps
configmaps:
  - name: web-content
    enabled: true
    data:
      index.html: |
        <!DOCTYPE html>
        <html>
        <head>
          <title>Страница из ConfigMap</title>
        </head>
        <body>
          <h1>Привет от Kubernetes!</h1>
          <p>Версия: {{ .Chart.AppVersion }}</p>
          <p>Релиз: {{ .Release.Name }}</p>
          <p>Namespace: {{ .Release.Namespace }}</p>
        </body>
        </html>

# Ingresses
ingresses:
  - name: web-app-ingress
    enabled: true
    annotations:
      kubernetes.io/ingress.class: nginx
    tls:
      - hosts:
          - web-app.example.com
        secretName: web-app-tls
    rules:
      - host: web-app.example.com
        http:
          paths:
            - path: /
              pathType: Prefix
              backend:
                service:
                  name: web-app-svc
                  port:
                    number: 80

# Secrets
secrets:
  - name: web-app-tls
    enabled: true
    type: kubernetes.io/tls
    data:
      tls.crt:  # ЗАМЕНИТЕ на base64-код сертификата (cat tls.crt | base64 -w 0)
      tls.key:  # ЗАМЕНИТЕ на base64-код ключа (cat tls.key | base64 -w 0)